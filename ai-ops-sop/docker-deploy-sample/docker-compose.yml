# AIOps Platform — Docker Compose (local dev / integration testing)
#
# Before starting:
#   1. Copy each service's config example and fill in secrets:
#      cp deploy/docker/aiops-app/config/.env.example           deploy/docker/aiops-app/config/.env
#      cp deploy/docker/java-backend/config/app.env.example     deploy/docker/java-backend/config/app.env
#      cp deploy/docker/java-scheduler/config/app.env.example   deploy/docker/java-scheduler/config/app.env
#      cp deploy/docker/python-sidecar/config/app.env.example   deploy/docker/python-sidecar/config/app.env
#      cp deploy/docker/ontology-simulator/config/app.env.example deploy/docker/ontology-simulator/config/app.env
#
#   2. Build images from repo root:
#      docker compose -f deploy/docker-compose.yml build
#
#   3. Start:
#      docker compose -f deploy/docker-compose.yml up
#
# All CHANGE_ME tokens that must match across services:
#   JAVA_INTERNAL_TOKEN          → java-backend app.env + python-sidecar app.env
#   PYTHON_SIDECAR_TOKEN (=SERVICE_TOKEN) → java-backend app.env + java-scheduler app.env + python-sidecar app.env
#   AIOPS_SCHEDULER_INTERNAL_TOKEN → java-backend app.env + java-scheduler app.env
#   AIOPS_OIDC_UPSERT_SECRET     → java-backend app.env + aiops-app .env

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: aiops
      POSTGRES_USER: aiops
      POSTGRES_PASSWORD: aiops_db_pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiops"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "27018:27017"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: aiops_keycloak_admin
      # Advertise localhost:8090 as the external URL so browsers + tokens use it
      KC_HOSTNAME_URL: http://localhost:8090
      KC_HOSTNAME_ADMIN_URL: http://localhost:8090
    ports:
      - "8090:8080"   # Admin UI: http://localhost:8090
      - "9000:9000"   # Management: http://localhost:9000/health
    volumes:
      - keycloak-data:/opt/keycloak/data

  # ── Application services ────────────────────────────────────────────────────
  ontology-simulator:
    build:
      context: ..
      dockerfile: deploy/docker/ontology-simulator/Dockerfile
    volumes:
      - ./docker/ontology-simulator/config:/usrapp/config:ro
      - ontology-simulator-logs:/usrapp/log
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8012:8080"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/status')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  aiops-java-api:
    build:
      context: ..
      dockerfile: deploy/docker/java-backend/Dockerfile
    volumes:
      - ./docker/java-backend/config:/usrapp/config:ro
      - java-api-logs:/usrapp/log
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    ports:
      - "8002:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s

  aiops-java-scheduler:
    build:
      context: ..
      dockerfile: deploy/docker/java-scheduler/Dockerfile
    volumes:
      - ./docker/java-scheduler/config:/usrapp/config:ro
      - java-scheduler-logs:/usrapp/log
    depends_on:
      aiops-java-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8003:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s

  aiops-python-sidecar:
    build:
      context: ..
      dockerfile: deploy/docker/python-sidecar/Dockerfile
    volumes:
      - ./docker/python-sidecar/config:/usrapp/config:ro
      - python-sidecar-logs:/usrapp/log
    depends_on:
      aiops-java-api:
        condition: service_healthy
    ports:
      - "8050:8080"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; r=urllib.request.Request('http://localhost:8080/internal/health', headers={'X-Service-Token':'aiops_sidecar_token_2024'}); urllib.request.urlopen(r)\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  aiops-app:
    build:
      context: ..
      dockerfile: deploy/docker/aiops-app/Dockerfile
    volumes:
      - ./docker/aiops-app/config:/usrapp/config:ro
      - aiops-app-logs:/usrapp/log
    depends_on:
      aiops-java-api:
        condition: service_healthy
      aiops-python-sidecar:
        condition: service_healthy
    ports:
      - "8000:8080"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/')\" 2>/dev/null; exit 0"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres-data:
  mongo-data:
  keycloak-data:
  java-api-logs:
  java-scheduler-logs:
  python-sidecar-logs:
  ontology-simulator-logs:
  aiops-app-logs:
