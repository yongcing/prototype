# All shared secrets for the AIOps platform.
# ⚠️  Change all values before deploying to any non-local environment.
# Values must match across services — see build_step.md for the token matrix.
#
# To update a secret after deployment:
#   kubectl create secret generic aiops-secrets -n aiops --from-literal=key=value --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: aiops-secrets
  namespace: aiops
type: Opaque
data:
  # PostgreSQL password — must match postgres StatefulSet POSTGRES_PASSWORD
  db-password: YWlvcHNfZGJfcGFzcw==
  # Spring Boot JWT signing key (local AUTH_MODE=local fallback)
  jwt-secret: Q0hBTkdFX01FXzMyX0NIQVJTX09SX01PUkVfX19fX19fX19fX19f
  # Frontend → Java internal call token (X-Internal-Token header)
  java-internal-token: YWlvcHNfaW50ZXJuYWxfdG9rZW5fMjAyNA==
  # Java/Scheduler → Sidecar service token (X-Service-Token header)
  sidecar-token: YWlvcHNfc2lkZWNhcl90b2tlbl8yMDI0
  # Scheduler internal token
  scheduler-token: YWlvcHNfc2NoZWR1bGVyX3Rva2VuXzIwMjQ=
  # Keycloak user upsert shared secret
  upsert-secret: YWlvcHNfdXBzZXJ0X3NlY3JldF8yMDI0
  # NextAuth session signing secret
  nextauth-secret: YWlvcHNfbmV4dGF1dGhfc2VjcmV0X2NoYW5nZV9tZV8hIQ==
  # Keycloak admin console password
  keycloak-admin-password: YWlvcHNfa2V5Y2xvYWtfYWRtaW4=
  # Keycloak client secrets (set these after running keycloak-setup, Step 5 in guide)
  oidc-backend-secret: YWlvcHMtYmFja2VuZC1zZWNyZXQtMjAyNA==
  oidc-frontend-secret: YWlvcHMtZnJvbnRlbmQtc2VjcmV0LTIwMjQ=
  # LLM API key — replace with real key or leave as placeholder if using Ollama
  anthropic-api-key: RklMTF9ZT1VSX0FOVEhST1BJQ19LRVk=
