# Non-sensitive environment variables shared across services.
# Sensitive values (tokens, passwords, API keys) are in 01-secrets.yaml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: aiops-config
  namespace: aiops
data:
  # ── Ports ──────────────────────────────────────────────────────────────────
  AIOPS_JAVA_PORT: "8080"
  SIDECAR_PORT: "8080"
  PORT: "8080"
  HOSTNAME: "0.0.0.0"

  # ── Database ───────────────────────────────────────────────────────────────
  DB_URL: "jdbc:postgresql://postgres:5432/aiops"
  DB_USER: "aiops"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  MONGODB_URI: "mongodb://mongo:27017"

  # ── Service-to-service URLs (K8s DNS: <service>.<namespace>.svc) ──────────
  FASTAPI_BASE_URL: "http://aiops-java-api:8080"
  AGENT_BASE_URL: "http://aiops-python-sidecar:8080"
  ONTOLOGY_BASE_URL: "http://ontology-simulator:8080"
  JAVA_API_URL: "http://aiops-java-api:8080"
  PYTHON_SIDECAR_URL: "http://aiops-python-sidecar:8080"
  ONTOLOGY_SIM_URL: "http://ontology-simulator:8080"
  AIOPS_SCHEDULER_BASE_URL: "http://aiops-java-scheduler:8080"

  # ── Java backend ───────────────────────────────────────────────────────────
  AIOPS_PROFILE: "prod"
  AUTH_MODE: "oidc"
  OIDC_ROLE_CLAIM: "roles"
  OIDC_ISSUER: "http://localhost:30090/realms/aiops"
  OIDC_CLIENT_ID: "aiops-backend"
  OIDC_JWK_URI: "http://keycloak:8080/realms/aiops/protocol/openid-connect/certs"
  JAVA_INTERNAL_ALLOWED_IPS: ""
  CORS_ALLOWED_ORIGINS: "http://localhost"

  # ── Scheduler ─────────────────────────────────────────────────────────────
  AIOPS_LOCK_NAMESPACE: "aiops:lock"
  AIOPS_LOCK_FAIL_OPEN: "true"

  # ── Frontend (Next.js) ────────────────────────────────────────────────────
  NEXTAUTH_URL: "http://localhost"
  OIDC_KEYCLOAK_CLIENT_ID: "aiops-frontend"
  OIDC_KEYCLOAK_ISSUER: "http://localhost:30090/realms/aiops"
  OIDC_KEYCLOAK_ISSUER_INTERNAL: "http://keycloak:8080/realms/aiops"
  AIOPS_AUTH_REQUIRED: "1"
  NODE_ENV: "production"

  # ── Python sidecar ────────────────────────────────────────────────────────
  ALLOWED_CALLERS: ""
  JAVA_TIMEOUT_SEC: "30"
  LLM_PROVIDER: "anthropic"
  ANTHROPIC_MODEL: "claude-sonnet-4-6"
  ANTHROPIC_MAX_TOKENS: "8096"
  EVENT_POLLER_ENABLED: "0"
  NATS_SUBSCRIBER_ENABLED: "0"
  # Ollama settings (only used when LLM_PROVIDER=ollama)
  OLLAMA_BASE_URL: "http://host.docker.internal:11434/v1"
  OLLAMA_MODEL: "qwen3:latest"
  OLLAMA_EMBEDDING_MODEL: "bge-m3"

---
# Postgres initialization script — enables pgvector + creates all tables.
# Mounted as a file into the postgres-init Job.
