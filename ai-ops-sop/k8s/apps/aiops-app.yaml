apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-app
  namespace: aiops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-app
  template:
    metadata:
      labels:
        app: aiops-app
    spec:
      containers:
        - name: aiops-app
          image: aiops-app:k8s
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: aiops-config
          env:
            - name: INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: java-internal-token
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: nextauth-secret
            - name: AIOPS_OIDC_UPSERT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: upsert-secret
            - name: OIDC_KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: oidc-frontend-secret
          # Next.js redirects unauthenticated requests → probe always passes
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-app
  namespace: aiops
spec:
  selector:
    app: aiops-app
  ports:
    - port: 8080
      targetPort: 8080
