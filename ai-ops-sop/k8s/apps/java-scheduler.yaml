apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-java-scheduler
  namespace: aiops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-java-scheduler
  template:
    metadata:
      labels:
        app: aiops-java-scheduler
    spec:
      containers:
        - name: aiops-java-scheduler
          image: aiops-java-scheduler:k8s
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: aiops-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: db-password
            - name: AIOPS_SCHEDULER_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: scheduler-token
            - name: PYTHON_SIDECAR_TOKEN
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: sidecar-token
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: aiops-java-scheduler
  namespace: aiops
spec:
  selector:
    app: aiops-java-scheduler
  ports:
    - port: 8080
      targetPort: 8080
