apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: keycloak-data
  namespace: aiops
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: hostpath
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: aiops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:25.0
          args: ["start-dev"]
          ports:
            - containerPort: 8080   # HTTP
            - containerPort: 9000   # management / health
          env:
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: aiops-secrets
                  key: keycloak-admin-password
            # NodePort 30090 is the external URL browsers and tokens use
            - name: KC_HOSTNAME_URL
              value: "http://localhost:30090"
            - name: KC_HOSTNAME_ADMIN_URL
              value: "http://localhost:30090"
          volumeMounts:
            - name: keycloak-data
              mountPath: /opt/keycloak/data
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 15
      volumes:
        - name: keycloak-data
          persistentVolumeClaim:
            claimName: keycloak-data
---
# NodePort on 30090 so Keycloak is reachable at http://localhost:30090
# and is NOT routed through the NGINX Ingress (avoids subpath complexity).
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: aiops
spec:
  type: NodePort
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30090
